<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>カードで学習塾 夏期講習編 フローモック</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #64717f;
      --line: #d8dee6;
      --panel: #ffffff;
      --page: #f5f7fa;
      --blue: #2f6fed;
      --green: #16815f;
      --yellow: #b7791f;
      --red: #c2413b;
      --violet: #6d5bd0;
      --shadow: 0 10px 28px rgba(28, 39, 54, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--page);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 320px;
      grid-template-rows: auto 1fr;
    }

    header {
      grid-column: 1 / -1;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 22px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 750;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      white-space: nowrap;
    }

    aside,
    main {
      min-height: 0;
    }

    .turn-nav {
      padding: 16px;
      border-right: 1px solid var(--line);
      background: #fff;
      overflow: auto;
    }

    .section-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .turn-list {
      display: grid;
      gap: 8px;
    }

    .turn-button {
      width: 100%;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 52px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .turn-button[aria-current="true"] {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(47, 111, 237, 0.14);
    }

    .turn-no {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #edf2f7;
      color: #334155;
      font-weight: 800;
      font-size: 13px;
    }

    .turn-button[aria-current="true"] .turn-no {
      background: var(--blue);
      color: #fff;
    }

    .turn-title {
      display: block;
      font-size: 14px;
      font-weight: 720;
      line-height: 1.2;
    }

    .turn-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .workspace {
      padding: 18px;
      overflow: auto;
    }

    .phase-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .phase-tab {
      min-height: 38px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      white-space: nowrap;
      cursor: pointer;
    }

    .phase-tab[aria-selected="true"] {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .stage {
      display: grid;
      gap: 14px;
    }

    .summary {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(260px, 0.8fr);
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .panel-body {
      padding: 16px;
    }

    .large-status {
      display: grid;
      gap: 12px;
    }

    .phase-name {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 800;
    }

    .phase-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .flow-line {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 8px;
    }

    .flow-step {
      min-height: 70px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbfc;
    }

    .flow-step.active {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .flow-step strong {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .flow-step span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .metric {
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 7px;
      font-size: 22px;
    }

    .mock-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.72fr);
      gap: 14px;
    }

    .cards-row,
    .deck-columns,
    .token-row {
      display: grid;
      gap: 10px;
    }

    .cards-row {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .mock-card {
      min-height: 116px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .mock-card.selected {
      border-color: var(--green);
      background: #ecfdf5;
    }

    .mock-card.flipped {
      color: #d8dde4;
      background: #4b5563;
      border-color: #4b5563;
    }

    .card-tag {
      display: inline-flex;
      width: fit-content;
      padding: 3px 7px;
      border-radius: 999px;
      background: #eef2ff;
      color: #334155;
      font-size: 11px;
      font-weight: 700;
    }

    .mock-card strong {
      font-size: 14px;
      line-height: 1.25;
    }

    .mock-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .mock-card.flipped p {
      color: #e5e7eb;
    }

    .staff-slots {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .staff-slot {
      min-height: 148px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .staff-slot.rest {
      border-style: dashed;
      background: #fff8e7;
    }

    .staff-slot h3 {
      margin: 0;
      font-size: 14px;
    }

    .mini-card {
      padding: 8px;
      border-radius: 5px;
      background: #f1f5f9;
      font-size: 12px;
      line-height: 1.35;
    }

    .deck-columns {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .deck-column {
      min-height: 230px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
    }

    .deck-head {
      padding: 9px 10px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      font-weight: 750;
    }

    .deck-list {
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .deck-item {
      min-height: 42px;
      padding: 7px;
      border-radius: 5px;
      background: #eef2f7;
      font-size: 12px;
      line-height: 1.3;
    }

    .deck-item.sr {
      background: #fef3c7;
    }

    .deck-item.ssr {
      background: #fce7f3;
    }

    .deck-item.used {
      background: #4b5563;
      color: #f3f4f6;
    }

    .token-row {
      grid-template-columns: repeat(3, 1fr);
    }

    .token {
      min-height: 68px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .token span {
      color: var(--muted);
      font-size: 12px;
    }

    .token strong {
      display: block;
      margin-top: 6px;
      font-size: 20px;
    }

    .side {
      border-left: 1px solid var(--line);
      background: #fff;
      padding: 16px;
      overflow: auto;
    }

    .compact-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .log {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .log-line {
      padding: 8px;
      border-left: 3px solid var(--blue);
      background: #f8fafc;
      font-size: 12px;
      color: #344054;
      line-height: 1.45;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .action-button {
      min-height: 36px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    .action-button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .mode-toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    .mode-toggle button {
      min-height: 32px;
      padding: 5px 10px;
      border: 0;
      border-right: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }

    .mode-toggle button:last-child {
      border-right: 0;
    }

    .mode-toggle button.active {
      background: var(--ink);
      color: #fff;
    }

    @media (max-width: 1120px) {
      .app {
        grid-template-columns: 240px minmax(0, 1fr);
      }

      .side {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .summary,
      .mock-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .app {
        display: block;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .turn-nav {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .turn-list {
        grid-template-columns: repeat(13, 180px);
        overflow-x: auto;
      }

      .flow-line,
      .cards-row,
      .staff-slots,
      .deck-columns,
      .metrics,
      .token-row {
        grid-template-columns: 1fr;
      }

      .phase-name {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>カードで学習塾 夏期講習編</h1>
        <div class="header-meta">
          <span>全体フローモック</span>
          <span class="pill">FRESH / PRO</span>
          <span class="pill">通常期4ターン + 講習期9ターン</span>
        </div>
      </div>
      <div class="header-meta">
        <span class="pill" id="periodPill">通常期</span>
        <span class="pill" id="turnPill">5月下旬</span>
        <span class="pill" id="phasePill">研修</span>
      </div>
    </header>

    <aside class="turn-nav">
      <p class="section-label">ターン</p>
      <div class="turn-list" id="turnList"></div>
    </aside>

    <main class="workspace">
      <div class="phase-tabs" id="phaseTabs"></div>
      <div class="stage">
        <section class="summary">
          <div class="panel">
            <div class="panel-header">
              <h2 class="panel-title">現在のフェーズ</h2>
              <span class="pill" id="phaseCount">1 / 13</span>
            </div>
            <div class="panel-body large-status">
              <p class="phase-name" id="phaseName">研修フェーズ</p>
              <p class="phase-copy" id="phaseDescription"></p>
              <div class="flow-line" id="flowLine"></div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header">
              <h2 class="panel-title">ステータス</h2>
              <span class="pill">モック値</span>
            </div>
            <div class="panel-body">
              <div class="metrics">
                <div class="metric"><span>体験</span><strong id="mExp">0</strong></div>
                <div class="metric"><span>入塾</span><strong id="mEnroll">0</strong></div>
                <div class="metric"><span>満足</span><strong id="mSat">3</strong></div>
                <div class="metric"><span>経理</span><strong id="mAcc">3</strong></div>
              </div>
            </div>
          </div>
        </section>

        <section class="mock-grid">
          <div class="panel">
            <div class="panel-header">
              <h2 class="panel-title" id="mainPanelTitle">フェーズ画面</h2>
              <div class="mode-toggle" aria-label="スタッフ別デッキ表示切替">
                <button type="button" class="active">タブ</button>
                <button type="button">全体</button>
              </div>
            </div>
            <div class="panel-body" id="mockContent"></div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <h2 class="panel-title">公開デッキ</h2>
              <span class="pill">常時公開</span>
            </div>
            <div class="panel-body">
              <div class="deck-columns" id="deckColumns"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <aside class="side">
      <p class="section-label">PRO講習期トークン</p>
      <div class="token-row">
        <div class="token"><span>情熱</span><strong id="tPassion">3</strong></div>
        <div class="token"><span>発想</span><strong id="tIdea">0</strong></div>
        <div class="token"><span>整理</span><strong id="tOrganize">0</strong></div>
      </div>

      <div class="actions">
        <button class="action-button primary" type="button" id="nextButton">次のフェーズ</button>
        <button class="action-button" type="button" id="prevButton">戻る</button>
      </div>

      <p class="section-label" style="margin-top: 18px;">確認ポイント</p>
      <ul class="compact-list" id="checkpoints"></ul>

      <p class="section-label" style="margin-top: 18px;">ログ</p>
      <div class="log" id="log"></div>
    </aside>
  </div>

  <script>
    const turns = [
      { name: '5月下旬', period: '通常期', pool: '地域', phases: ['研修', '教室行動', '教室会議'] },
      { name: '6月上旬', period: '通常期', pool: '全校', phases: ['研修', '教室行動', '教室会議'] },
      { name: '6月下旬', period: '通常期', pool: '地域', phases: ['研修', '教室行動', '教室会議'] },
      { name: '7月上旬', period: '通常期', pool: '全校', phases: ['研修', '教室行動', '教室会議'] },
      { name: '前期1日目', period: '講習期', prep: 3, phases: ['講習期準備', '教室行動', '教室会議'] },
      { name: '前期2日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '前期3日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '中期1日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '中期2日目', period: '講習期', ssr: true, phases: ['教室行動', '教室会議'] },
      { name: '後期1日目', period: '講習期', prep: 2, phases: ['講習期準備', '教室行動', '教室会議'] },
      { name: '後期2日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '後期3日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '後期4日目', period: '講習期', phases: ['教室行動', '教室会議', '結果'] }
    ];

    const samples = {
      hand: [
        ['動員 R', '地域チラシ配布', '体験+2。通常期おすすめでさらに体験+2'],
        ['教務 SR', '講習カリキュラム設計', '入塾+3。講習期は使用後に裏返し'],
        ['応対 R', '保護者フォロー', '満足+2'],
        ['庶務 SSR', '備品注文の最適化', '経理+4。強力だが使用後に裏返し']
      ],
      decks: {
        '室長': ['問合対応の基本', '地域チラシ配布', '講習説明会'],
        '講師': ['質問対応の基本', '講習カリキュラム設計', '補習計画'],
        '事務': ['経理精算の基本', '保護者フォロー', '備品注文の最適化'],
        'アルバイト': ['自習室サポート']
      }
    };

    let state = { turn: 0, phase: 0 };

    function phaseInfo(turn, phaseName) {
      if (phaseName === '研修') {
        return {
          title: '研修フェーズ',
          desc: `${turn.pool}研修プールの4カテゴリから、カテゴリを選んで1枚引く操作を4回行い、手札4枚を作る。`,
          checkpoints: ['同じカテゴリを連続選択できる', '引いたカードは自分のみ確認', '山札はカテゴリ×地域/全校の8山構成']
        };
      }
      if (phaseName === '教室行動' && turn.period === '通常期') {
        return {
          title: '通常期 教室行動フェーズ',
          desc: '手札4枚から3枚を室長/講師/事務に配置する。未割当スタッフにはNプールから1枚を選んで補完する。',
          checkpoints: ['通常期おすすめ: 動員→体験+2、庶務→経理+2', 'Nカードも講習デッキへ移動', '並行カードだけ重ね配置できる']
        };
      }
      if (phaseName === '教室会議' && turn.period === '通常期') {
        return {
          title: '通常期 教室会議フェーズ',
          desc: '配置済みカードを各スタッフの講習デッキへ移動し、余りカードは条件を満たせばアルバイト講師デッキへ入れる。',
          checkpoints: ['講習デッキは常時公開', 'アルバイト講師デッキはR/SRかつ講師可', '移動しない余りカードは除外']
        };
      }
      if (phaseName === '講習期準備') {
        return {
          title: '講習期準備フェーズ',
          desc: `8山札から1山を選び、トップ3枚から1枚を選んで既存カードと交換する。このターンは${turn.prep}回実行する。`,
          checkpoints: ['前期1日目は3回', '後期1日目は2回', '交換相手は同一レアリティ以下']
        };
      }
      if (phaseName === '教室行動') {
        return {
          title: '講習期 教室行動フェーズ',
          desc: '3スタッフ別講習デッキとアルバイト講師デッキから各1枚を選んで実行する。休む選択も可能。',
          checkpoints: ['講習期おすすめ: 教務→入塾+2、応対→満足+2', 'SR/SSRは使用後に裏返し', '休んだスタッフは会議で復活判定']
        };
      }
      if (phaseName === '教室会議') {
        return {
          title: '講習期 教室会議フェーズ',
          desc: turn.ssr ? '休んだスタッフのSRを復活し、中期2日両方休んだスタッフのSSRも復活する。PROではトークン消費操作を行う。' : '休んだスタッフのSRを復活する。PROでは情熱/発想/整理トークンを消費できる。',
          checkpoints: ['SRはそのターン休めば復活', 'SSRは中期1日目と2日目を両方休むと復活', '情熱=復活、発想=追加獲得、整理=削除']
        };
      }
      return {
        title: '結果画面',
        desc: '通常期+講習期で累積した4指標を夏期rank CSVで評価し、総合ランクを表示する。',
        checkpoints: ['rankSummerFresh / rankSummerProを使用', 'ゲーム終了時追加処理なし', 'ハイスコアキーはcdg_summer_highscore_{difficulty}']
      };
    }

    function cardHtml(card, index, extra = '') {
      return `<div class="mock-card ${extra}">
        <span class="card-tag">${card[0]}</span>
        <strong>${card[1]}</strong>
        <p>${card[2]}</p>
      </div>`;
    }

    function renderMock(turn, phaseName) {
      if (phaseName === '研修') {
        return `<div class="cards-row">${samples.hand.map((card, index) => cardHtml(card, index, index === 1 ? 'selected' : '')).join('')}</div>
          <div class="actions"><button class="action-button primary">教務を引く</button><button class="action-button">動員を引く</button><button class="action-button">応対を引く</button><button class="action-button">庶務を引く</button></div>`;
      }
      if (phaseName === '教室行動' && turn.period === '通常期') {
        return `<div class="staff-slots">
          <div class="staff-slot"><h3>室長</h3><div class="mini-card">地域チラシ配布</div></div>
          <div class="staff-slot"><h3>講師</h3><div class="mini-card">講習カリキュラム設計</div></div>
          <div class="staff-slot rest"><h3>事務</h3><div class="mini-card">N: 経理精算の基本</div></div>
          <div class="staff-slot"><h3>余り</h3><div class="mini-card">保護者フォロー</div></div>
        </div>`;
      }
      if (phaseName === '教室会議' && turn.period === '通常期') {
        return `<div class="staff-slots">
          <div class="staff-slot"><h3>室長デッキへ</h3><div class="mini-card">地域チラシ配布</div></div>
          <div class="staff-slot"><h3>講師デッキへ</h3><div class="mini-card">講習カリキュラム設計</div></div>
          <div class="staff-slot"><h3>事務デッキへ</h3><div class="mini-card">経理精算の基本</div></div>
          <div class="staff-slot"><h3>アルバイト候補</h3><div class="mini-card">保護者フォロー: 条件不一致なら除外</div></div>
        </div>`;
      }
      if (phaseName === '講習期準備') {
        return `<div class="cards-row">
          ${cardHtml(['R', '自習室サポート', 'アルバイト講師デッキ候補'], 0, 'selected')}
          ${cardHtml(['SR', '補習計画', '同一以下の既存カードと交換'], 1)}
          ${cardHtml(['SSR', '夏期特別面談', '交換できない場合は除外'], 2)}
          <div class="mock-card"><span class="card-tag">${turn.prep}回</span><strong>準備カウンタ</strong><p>トップ3枚から1枚を選択して交換する。</p></div>
        </div>`;
      }
      if (phaseName === '教室行動') {
        return `<div class="staff-slots">
          <div class="staff-slot"><h3>室長</h3><div class="mini-card">講習説明会</div></div>
          <div class="staff-slot"><h3>講師</h3><div class="mini-card">講習カリキュラム設計 SR</div></div>
          <div class="staff-slot rest"><h3>事務</h3><div class="mini-card">休む</div></div>
          <div class="staff-slot"><h3>アルバイト</h3><div class="mini-card">自習室サポート</div></div>
        </div>`;
      }
      if (phaseName === '教室会議') {
        return `<div class="staff-slots">
          <div class="staff-slot"><h3>室長</h3><div class="mini-card">SR復活なし</div></div>
          <div class="staff-slot"><h3>講師</h3><div class="mini-card">使用SRを裏返し</div></div>
          <div class="staff-slot rest"><h3>事務</h3><div class="mini-card">休み: SR復活</div></div>
          <div class="staff-slot"><h3>PRO操作</h3><div class="mini-card">情熱/発想/整理を消費</div></div>
        </div>`;
      }
      return `<div class="staff-slots">
        <div class="staff-slot"><h3>体験</h3><div class="mini-card">夏期rank CSVで評価</div></div>
        <div class="staff-slot"><h3>入塾</h3><div class="mini-card">退塾差分を計算</div></div>
        <div class="staff-slot"><h3>満足/経理</h3><div class="mini-card">退塾計算に使用</div></div>
        <div class="staff-slot"><h3>総合ランク</h3><div class="mini-card">A / S / SS など</div></div>
      </div>`;
    }

    function renderDecks(turnIndex, phaseName) {
      const used = turnIndex > 4 && phaseName !== '講習期準備';
      return Object.entries(samples.decks).map(([name, cards]) => {
        const items = cards.map((card, idx) => {
          const cls = idx === 1 ? 'sr' : idx === 2 ? 'ssr' : '';
          const usedCls = used && idx === 1 && name === '講師' ? ' used' : '';
          return `<div class="deck-item ${cls}${usedCls}">${card}</div>`;
        }).join('');
        return `<div class="deck-column"><div class="deck-head">${name}</div><div class="deck-list">${items}</div></div>`;
      }).join('');
    }

    function renderFlow(turn, phaseName) {
      const base = turn.phases.map((phase) => ({ label: phase, desc: phase === '講習期準備' ? `${turn.prep}回実行` : '実行中の画面' }));
      return base.map((step) => `<div class="flow-step ${step.label === phaseName ? 'active' : ''}"><strong>${step.label}</strong><span>${step.desc}</span></div>`).join('');
    }

    function render() {
      const turn = turns[state.turn];
      const phaseName = turn.phases[state.phase];
      const info = phaseInfo(turn, phaseName);
      document.getElementById('periodPill').textContent = turn.period;
      document.getElementById('turnPill').textContent = turn.name;
      document.getElementById('phasePill').textContent = phaseName;
      document.getElementById('phaseCount').textContent = `${state.turn + 1} / ${turns.length}`;
      document.getElementById('phaseName').textContent = info.title;
      document.getElementById('phaseDescription').textContent = info.desc;
      document.getElementById('mainPanelTitle').textContent = `${turn.name} / ${phaseName}`;
      document.getElementById('flowLine').innerHTML = renderFlow(turn, phaseName);
      document.getElementById('mockContent').innerHTML = renderMock(turn, phaseName);
      document.getElementById('deckColumns').innerHTML = renderDecks(state.turn, phaseName);
      document.getElementById('checkpoints').innerHTML = info.checkpoints.map((item) => `<li>${item}</li>`).join('');
      document.getElementById('log').innerHTML = [
        `${turn.name}: ${phaseName}を表示`,
        turn.period === '通常期' ? `${turn.pool}研修プールを参照` : 'スタッフ別講習デッキを公開',
        phaseName === '結果' ? 'ゲーム終了処理へ' : '次フェーズへ進行可能'
      ].map((line) => `<div class="log-line">${line}</div>`).join('');
      document.getElementById('mExp').textContent = state.turn < 4 ? state.turn * 3 : 12;
      document.getElementById('mEnroll').textContent = state.turn < 4 ? state.turn : 8 + state.turn;
      document.getElementById('mSat').textContent = 3 + Math.min(state.turn, 8);
      document.getElementById('mAcc').textContent = 3 + Math.min(state.turn * 2, 18);
      document.getElementById('tPassion').textContent = turn.period === '講習期' ? '4' : '3';
      document.getElementById('tIdea').textContent = turn.period === '講習期' ? '1' : '0';
      document.getElementById('tOrganize').textContent = turn.period === '講習期' ? '1' : '0';

      document.querySelectorAll('.turn-button').forEach((button, index) => {
        button.setAttribute('aria-current', index === state.turn ? 'true' : 'false');
      });
      document.querySelectorAll('.phase-tab').forEach((button, index) => {
        button.setAttribute('aria-selected', index === state.phase ? 'true' : 'false');
      });
    }

    function renderNav() {
      document.getElementById('turnList').innerHTML = turns.map((turn, index) => `
        <button type="button" class="turn-button" data-turn="${index}" aria-current="${index === 0 ? 'true' : 'false'}">
          <span class="turn-no">${index + 1}</span>
          <span><span class="turn-title">${turn.name}</span><span class="turn-sub">${turn.period}${turn.prep ? ` / 準備${turn.prep}回` : ''}</span></span>
        </button>
      `).join('');
      document.querySelectorAll('.turn-button').forEach((button) => {
        button.addEventListener('click', () => {
          state.turn = Number(button.dataset.turn);
          state.phase = 0;
          renderPhaseTabs();
          render();
        });
      });
      renderPhaseTabs();
    }

    function renderPhaseTabs() {
      const turn = turns[state.turn];
      document.getElementById('phaseTabs').innerHTML = turn.phases.map((phase, index) => `
        <button type="button" class="phase-tab" data-phase="${index}" aria-selected="${index === state.phase ? 'true' : 'false'}">${phase}</button>
      `).join('');
      document.querySelectorAll('.phase-tab').forEach((button) => {
        button.addEventListener('click', () => {
          state.phase = Number(button.dataset.phase);
          render();
        });
      });
    }

    function move(delta) {
      const turn = turns[state.turn];
      const nextPhase = state.phase + delta;
      if (nextPhase >= 0 && nextPhase < turn.phases.length) {
        state.phase = nextPhase;
      } else if (delta > 0 && state.turn < turns.length - 1) {
        state.turn += 1;
        state.phase = 0;
        renderPhaseTabs();
      } else if (delta < 0 && state.turn > 0) {
        state.turn -= 1;
        state.phase = turns[state.turn].phases.length - 1;
        renderPhaseTabs();
      }
      render();
    }

    document.getElementById('nextButton').addEventListener('click', () => move(1));
    document.getElementById('prevButton').addEventListener('click', () => move(-1));
    document.querySelectorAll('.mode-toggle button').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.mode-toggle button').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
      });
    });

    renderNav();
    render();
  </script>
</body>
</html>
