<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>カードで学習塾 夏期講習編 フローモック</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #d7dee8;
      --text: #1f2937;
      --muted: #66758a;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #15803d;
      --green-soft: #dcfce7;
      --yellow-soft: #fef3c7;
      --rose-soft: #ffe4e6;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      grid-template-rows: auto 1fr;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 800;
    }

    .brand-copy {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .summary-toggle,
    .menu-button {
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }

    .summary-toggle {
      min-width: 212px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: left;
    }

    .summary-item {
      display: grid;
      gap: 3px;
    }

    .summary-item span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .summary-item strong {
      font-size: 13px;
      line-height: 1.2;
    }

    .menu-button {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow);
    }

    .turn-nav {
      min-height: 0;
      padding: 14px;
      border-right: 1px solid var(--line);
      background: #fff;
      overflow: auto;
    }

    .section-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .turn-list {
      display: grid;
      gap: 8px;
    }

    .turn-button {
      width: 100%;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      min-height: 56px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      text-align: left;
      cursor: pointer;
    }

    .turn-button[aria-current="true"] {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .turn-no {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #e2e8f0;
      font-size: 13px;
      font-weight: 800;
    }

    .turn-button[aria-current="true"] .turn-no {
      background: var(--blue);
      color: #fff;
    }

    .turn-title {
      display: block;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.2;
    }

    .turn-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .workspace {
      min-height: 0;
      padding: 14px;
      overflow: auto;
    }

    .phase-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      overflow-x: auto;
    }

    .phase-tab {
      min-height: 36px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      white-space: nowrap;
      cursor: pointer;
    }

    .phase-tab[aria-selected="true"] {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.85fr);
      gap: 14px;
    }

    .stack {
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .panel-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      padding: 14px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .status-card {
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .status-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .status-card strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
      line-height: 1;
    }

    .token-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .token-card {
      min-height: 58px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .token-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .token-card strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
    }

    .hand-area {
      display: grid;
      gap: 12px;
    }

    .hand-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .hand-slot {
      min-height: 138px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .hand-slot.pending {
      background: #f8fafc;
      border-style: dashed;
    }

    .hand-slot.new-card {
      animation: slide-in 420ms ease;
      border-color: var(--green);
      background: var(--green-soft);
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateX(48px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card-tag {
      display: inline-flex;
      width: fit-content;
      padding: 3px 7px;
      border-radius: 999px;
      background: #e0e7ff;
      font-size: 11px;
      font-weight: 700;
    }

    .card-tag.sr {
      background: var(--yellow-soft);
    }

    .card-tag.ssr {
      background: var(--rose-soft);
    }

    .hand-slot strong,
    .choice-card strong,
    .deck-item strong {
      font-size: 14px;
      line-height: 1.3;
    }

    .hand-slot p,
    .choice-card p,
    .deck-item p,
    .mini-card {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .choice-button {
      min-height: 92px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      display: grid;
      gap: 8px;
      text-align: left;
      cursor: pointer;
    }

    .choice-button.active {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .choice-note {
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 6px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .staff-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .staff-slot {
      min-height: 152px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .staff-slot.rest {
      border-style: dashed;
      background: #fff9db;
    }

    .staff-slot h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }

    .mini-card {
      padding: 8px;
      border-radius: 5px;
      background: #f1f5f9;
    }

    .deck-columns {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .deck-column {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
    }

    .deck-head {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      font-size: 13px;
      font-weight: 800;
    }

    .deck-list {
      display: grid;
      gap: 6px;
      padding: 8px;
    }

    .deck-item {
      padding: 8px;
      border-radius: 5px;
      background: #eef2f7;
    }

    .deck-item.sr {
      background: var(--yellow-soft);
    }

    .deck-item.ssr {
      background: var(--rose-soft);
    }

    .deck-item.used {
      background: #4b5563;
      color: #f9fafb;
    }

    .deck-item.used p {
      color: #e5e7eb;
    }

    .schedule-list {
      display: grid;
      gap: 8px;
    }

    .schedule-item {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      line-height: 1.35;
    }

    .schedule-item.current {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .checks,
    .log {
      display: grid;
      gap: 8px;
    }

    .check-item,
    .log-line {
      padding: 9px 10px;
      border-left: 3px solid var(--blue);
      background: #f8fafc;
      font-size: 12px;
      line-height: 1.45;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .action-button {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }

    .action-button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.44);
      z-index: 10;
    }

    .overlay.open {
      display: flex;
    }

    .overlay-card {
      width: min(920px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
    }

    .overlay-body {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .phase-name {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
    }

    .phase-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .flow-line {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .flow-step {
      min-height: 66px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbfc;
    }

    .flow-step.active {
      border-color: var(--blue);
      background: #eff6ff;
    }

    .flow-step strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .flow-step span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .two-column {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
    }

    @media (max-width: 1120px) {
      .layout,
      .two-column {
        grid-template-columns: 1fr;
      }

      .status-grid,
      .token-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .app {
        display: block;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-actions {
        width: 100%;
        justify-content: space-between;
      }

      .turn-nav {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .turn-list {
        grid-template-columns: repeat(13, 180px);
        overflow-x: auto;
      }

      .summary-toggle {
        min-width: 0;
        width: calc(100% - 52px);
      }

      .hand-grid,
      .status-grid,
      .token-row,
      .deck-columns {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .staff-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .choice-grid,
      .hand-grid,
      .deck-columns,
      .flow-line {
        grid-template-columns: 1fr;
      }

      .status-grid,
      .token-row,
      .staff-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .phase-name {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>カードで学習塾 夏期講習編</h1>
        <div class="brand-copy">春期講習の画面密度を踏襲した全体フローモック</div>
      </div>
      <div class="header-actions">
        <button type="button" class="summary-toggle" id="summaryToggle" aria-haspopup="dialog" aria-controls="phaseOverlay" aria-expanded="false">
          <span class="summary-item"><span>期</span><strong id="periodPill">通常期</strong></span>
          <span class="summary-item"><span>ターン</span><strong id="turnPill">5月下旬</strong></span>
          <span class="summary-item"><span>フェーズ</span><strong id="phasePill">研修</strong></span>
        </button>
        <button type="button" class="menu-button" id="menuToggle" aria-label="デッキと予定を表示" aria-haspopup="dialog" aria-controls="menuOverlay" aria-expanded="false">🗂️</button>
      </div>
    </header>

    <aside class="turn-nav">
      <p class="section-label">ターン</p>
      <div class="turn-list" id="turnList"></div>
    </aside>

    <main class="workspace">
      <div class="phase-tabs" id="phaseTabs"></div>
      <div class="layout">
        <div class="stack">
          <section class="panel">
            <div class="panel-header">
              <h2 class="panel-title">ステータス</h2>
              <span class="panel-meta">春期準拠のコンパクト表示</span>
            </div>
            <div class="panel-body">
              <div class="status-grid">
                <div class="status-card"><span>体験</span><strong id="mExp">0</strong></div>
                <div class="status-card"><span>入塾</span><strong id="mEnroll">0</strong></div>
                <div class="status-card"><span>満足</span><strong id="mSat">3</strong></div>
                <div class="status-card"><span>経理</span><strong id="mAcc">3</strong></div>
              </div>
              <div class="token-row">
                <div class="token-card"><span>情熱</span><strong id="tPassion">3</strong></div>
                <div class="token-card"><span>発想</span><strong id="tIdea">0</strong></div>
                <div class="token-card"><span>整理</span><strong id="tOrganize">0</strong></div>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2 class="panel-title" id="mainPanelTitle">5月下旬 / 研修</h2>
              <span class="panel-meta" id="phaseCount">1 / 13</span>
            </div>
            <div class="panel-body" id="mockContent"></div>
            <div class="panel-body" style="padding-top: 0;">
              <div class="footer-actions">
                <button class="action-button" type="button" id="prevButton">戻る</button>
                <button class="action-button primary" type="button" id="nextButton">次のフェーズ</button>
              </div>
            </div>
          </section>
        </div>

        <div class="stack">
          <section class="panel">
            <div class="panel-header">
              <h2 class="panel-title">確認ポイント</h2>
              <span class="panel-meta">実装前の論点</span>
            </div>
            <div class="panel-body">
              <div class="checks" id="checkpoints"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2 class="panel-title">ログ</h2>
              <span class="panel-meta">遷移イメージ</span>
            </div>
            <div class="panel-body">
              <div class="log" id="log"></div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <div class="overlay" id="phaseOverlay" aria-hidden="true">
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="phaseName">
      <div class="panel-header">
        <h2 class="panel-title">現在のフェーズ</h2>
        <button type="button" class="action-button" data-close="#phaseOverlay">閉じる</button>
      </div>
      <div class="overlay-body">
        <div>
          <p class="phase-name" id="phaseName">研修フェーズ</p>
          <p class="phase-copy" id="phaseDescription"></p>
        </div>
        <div class="flow-line" id="flowLine"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="menuOverlay" aria-hidden="true">
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
      <div class="panel-header">
        <h2 class="panel-title" id="menuTitle">デッキと予定</h2>
        <button type="button" class="action-button" data-close="#menuOverlay">閉じる</button>
      </div>
      <div class="overlay-body">
        <div class="two-column">
          <section>
            <p class="section-label">現在のデッキ</p>
            <div class="deck-columns" id="deckColumns"></div>
          </section>
          <section>
            <p class="section-label">今後のスケジュール</p>
            <div class="schedule-list" id="scheduleList"></div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <script>
    const turns = [
      { name: '5月下旬', period: '通常期', pool: '地域', phases: ['研修', '教室行動', '教室会議'] },
      { name: '6月上旬', period: '通常期', pool: '全校', phases: ['研修', '教室行動', '教室会議'] },
      { name: '6月下旬', period: '通常期', pool: '地域', phases: ['研修', '教室行動', '教室会議'] },
      { name: '7月上旬', period: '通常期', pool: '全校', phases: ['研修', '教室行動', '教室会議'] },
      { name: '前期1日目', period: '講習期', prep: 3, phases: ['講習期準備', '教室行動', '教室会議'] },
      { name: '前期2日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '前期3日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '中期1日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '中期2日目', period: '講習期', ssr: true, phases: ['教室行動', '教室会議'] },
      { name: '後期1日目', period: '講習期', prep: 2, phases: ['講習期準備', '教室行動', '教室会議'] },
      { name: '後期2日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '後期3日目', period: '講習期', phases: ['教室行動', '教室会議'] },
      { name: '後期4日目', period: '講習期', phases: ['教室行動', '教室会議', '結果'] }
    ];

    const trainingChoices = [
      { key: '動員', rarity: 'R', title: '地域チラシ配布', desc: '体験+2。通常期おすすめでさらに体験+2' },
      { key: '教務', rarity: 'SR', title: '講習カリキュラム設計', desc: '入塾+3。講習期は使用後に裏返し' },
      { key: '応対', rarity: 'R', title: '保護者フォロー', desc: '満足+2' },
      { key: '庶務', rarity: 'SSR', title: '備品注文の最適化', desc: '経理+4。強力だが使用後に裏返し' }
    ];

    const samples = {
      decks: {
        '室長': [
          { rarity: 'N', title: '問合対応の基本', desc: '通常期補完カード' },
          { rarity: 'R', title: '地域チラシ配布', desc: '体験+2' },
          { rarity: 'SR', title: '講習説明会', desc: '体験+3 / 満足+1' }
        ],
        '講師': [
          { rarity: 'N', title: '質問対応の基本', desc: '通常期補完カード' },
          { rarity: 'SR', title: '講習カリキュラム設計', desc: '入塾+3' },
          { rarity: 'R', title: '補習計画', desc: '入塾+1 / 満足+1' }
        ],
        '事務': [
          { rarity: 'N', title: '経理精算の基本', desc: '通常期補完カード' },
          { rarity: 'R', title: '保護者フォロー', desc: '満足+2' },
          { rarity: 'SSR', title: '備品注文の最適化', desc: '経理+4' }
        ],
        'アルバイト': [
          { rarity: 'R', title: '自習室サポート', desc: '満足+1 / 講師可のみ' }
        ]
      }
    };

    let state = { turn: 0, phase: 0 };

    function phaseInfo(turn, phaseName) {
      if (phaseName === '研修') {
        return {
          title: '研修フェーズ',
          desc: `${turn.pool}研修プールの4カテゴリから1枚ずつではなく、カテゴリを都度選びながら4回引いて手札4枚を作る。獲得カードは画面内へスライドインし、次の四択をそのまま続行する。`,
          checkpoints: ['四択ボタンは常に1画面内へ収める', '獲得演出後もスクロール遷移なしで次の選択へ進む', '春期講習と同じ密度で手札4枠を上段固定する']
        };
      }
      if (phaseName === '教室行動' && turn.period === '通常期') {
        return {
          title: '通常期 教室行動フェーズ',
          desc: '手札4枚から3枚を室長・講師・事務へ配置し、未割当はNプールから補完する。縦画面では4スタッフ枠を2列×2行で表示する。',
          checkpoints: ['おすすめボーナスは表示だけでなく後続ロジックに接続する前提で領域を確保', '余りカードの扱いを同画面で把握できる', '縦画面で4枠を1列縦積みにしない']
        };
      }
      if (phaseName === '教室会議' && turn.period === '通常期') {
        return {
          title: '通常期 教室会議フェーズ',
          desc: '配置済みカードをスタッフ別講習デッキへ移し、余りカードは条件を満たす場合のみアルバイト講師デッキへ入れる。',
          checkpoints: ['公開デッキはヘッダーメニューから確認する', '画面本体は選択と結果確認に集中させる', 'アルバイト候補の条件不一致はその場で説明可能にする']
        };
      }
      if (phaseName === '講習期準備') {
        return {
          title: '講習期準備フェーズ',
          desc: `8山札から1山を選び、トップ3枚から1枚を選んで既存カードと交換する。このターンは${turn.prep}回実行する。`,
          checkpoints: ['前期1日目は3回、後期1日目は2回', '交換対象の比較情報を同一オーバーレイで見せられる構成にする', '公開デッキ確認はメニュー導線に寄せる']
        };
      }
      if (phaseName === '教室行動') {
        return {
          title: '講習期 教室行動フェーズ',
          desc: '室長・講師・事務・アルバイトの4デッキから1枚ずつ選んで実行する。休む場合も同じスタッフ枠内で示す。',
          checkpoints: ['4スタッフ表示は縦画面で2列×2行', 'SR/SSRの裏返し状態はカード色と文言で判別可能にする', '講習期おすすめの反映先を明示する']
        };
      }
      if (phaseName === '教室会議') {
        return {
          title: '講習期 教室会議フェーズ',
          desc: turn.ssr ? '休んだスタッフのSRを復活し、中期2日間とも休んだスタッフのSSRも復活する。PROではトークン消費操作を行う。' : '休んだスタッフのSRを復活する。PROでは情熱・発想・整理トークンを消費できる。',
          checkpoints: ['復活判定の説明はフェーズ詳細オーバーレイで確認できる', 'トークン値は常時ステータスで参照できる', '画面本体はスタッフ別結果確認を優先する']
        };
      }
      return {
        title: '結果画面',
        desc: '通常期と講習期で累積した4指標を夏期rank CSVで評価し、総合ランクを表示する。',
        checkpoints: ['rankSummerFresh / rankSummerPro を使う前提の表示', '春期と同様に結果指標を先に見せ、その後総合ランクを示す', '保存キーは cdg_summer_highscore_{difficulty}']
      };
    }

    function getRarityClass(rarity) {
      if (rarity === 'SR') return 'sr';
      if (rarity === 'SSR') return 'ssr';
      return '';
    }

    function renderTrainingHand(turnIndex) {
      return trainingChoices.map((card, index) => {
        const gained = index < Math.min(turnIndex + 1, 4);
        const slotClass = gained ? `hand-slot ${index === Math.min(turnIndex, 3) ? 'new-card' : ''}` : 'hand-slot pending';
        const body = gained
          ? `<span class="card-tag ${getRarityClass(card.rarity)}">${card.key} ${card.rarity}</span><strong>${card.title}</strong><p>${card.desc}</p>`
          : `<span class="card-tag">手札${index + 1}</span><strong>次の獲得枠</strong><p>カテゴリを選ぶとここへカードがスライドインする。</p>`;
        return `<div class="${slotClass}">${body}</div>`;
      }).join('');
    }

    function renderTrainingChoices() {
      return trainingChoices.map((card, index) => `
        <button type="button" class="choice-button ${index === 1 ? 'active' : ''}">
          <span class="card-tag ${getRarityClass(card.rarity)}">${card.key}</span>
          <strong>${card.title}</strong>
          <p>${card.desc}</p>
        </button>
      `).join('');
    }

    function renderStaffGrid(cards) {
      return `<div class="staff-grid">${cards.map((item) => `
        <div class="staff-slot ${item.rest ? 'rest' : ''}">
          <h3>${item.name}</h3>
          <div class="mini-card">${item.body}</div>
        </div>
      `).join('')}</div>`;
    }

    function renderMock(turn, phaseName) {
      if (phaseName === '研修') {
        return `<div class="hand-area">
          <div class="hand-grid" id="handGrid">${renderTrainingHand(state.turn)}</div>
          <div class="choice-grid">${renderTrainingChoices()}</div>
          <div class="choice-note">カテゴリ選択、獲得演出、手札確認を同じ画面内で完結させる。次の四択は常に下段へ残し、春期講習の手札確認テンポを維持する。</div>
        </div>`;
      }
      if (phaseName === '教室行動' && turn.period === '通常期') {
        return renderStaffGrid([
          { name: '室長', body: '地域チラシ配布' },
          { name: '講師', body: '講習カリキュラム設計' },
          { name: '事務', body: 'N: 経理精算の基本', rest: true },
          { name: '余り', body: '保護者フォロー' }
        ]);
      }
      if (phaseName === '教室会議' && turn.period === '通常期') {
        return renderStaffGrid([
          { name: '室長デッキへ', body: '地域チラシ配布' },
          { name: '講師デッキへ', body: '講習カリキュラム設計' },
          { name: '事務デッキへ', body: '経理精算の基本' },
          { name: 'アルバイト候補', body: '保護者フォロー: 条件不一致なら除外' }
        ]);
      }
      if (phaseName === '講習期準備') {
        return `<div class="hand-area">
          <div class="hand-grid">
            <div class="hand-slot new-card"><span class="card-tag">R</span><strong>自習室サポート</strong><p>アルバイト講師デッキ候補</p></div>
            <div class="hand-slot"><span class="card-tag sr">SR</span><strong>補習計画</strong><p>同一レアリティ以下の既存カードと交換</p></div>
            <div class="hand-slot"><span class="card-tag ssr">SSR</span><strong>夏期特別面談</strong><p>交換不可なら除外</p></div>
            <div class="hand-slot pending"><span class="card-tag">${turn.prep}回</span><strong>準備カウンタ</strong><p>トップ3枚から1枚を選択して交換する。</p></div>
          </div>
          <div class="choice-note">デッキ全体はヘッダーメニューで確認し、この画面では交換候補の比較に集中させる。</div>
        </div>`;
      }
      if (phaseName === '教室行動') {
        return renderStaffGrid([
          { name: '室長', body: '講習説明会' },
          { name: '講師', body: '講習カリキュラム設計 SR' },
          { name: '事務', body: '休む', rest: true },
          { name: 'アルバイト', body: '自習室サポート' }
        ]);
      }
      if (phaseName === '教室会議') {
        return renderStaffGrid([
          { name: '室長', body: 'SR復活なし' },
          { name: '講師', body: '使用SRを裏返し' },
          { name: '事務', body: '休み: SR復活', rest: true },
          { name: 'PRO操作', body: '情熱 / 発想 / 整理を消費' }
        ]);
      }
      return renderStaffGrid([
        { name: '体験', body: '夏期rank CSVで評価' },
        { name: '入塾', body: '退塾差分を計算' },
        { name: '満足 / 経理', body: '退塾計算に使用' },
        { name: '総合ランク', body: 'A / S / SS など' }
      ]);
    }

    function renderDecks(turnIndex, phaseName) {
      const used = turnIndex > 4 && phaseName !== '講習期準備';
      return Object.entries(samples.decks).map(([name, cards]) => {
        const items = cards.map((card, idx) => {
          const cls = `${getRarityClass(card.rarity)}${used && idx === 1 && name === '講師' ? ' used' : ''}`;
          return `<div class="deck-item ${cls}">
            <span class="card-tag ${getRarityClass(card.rarity)}">${card.rarity}</span>
            <strong>${card.title}</strong>
            <p>${card.desc}</p>
          </div>`;
        }).join('');
        return `<div class="deck-column"><div class="deck-head">${name}</div><div class="deck-list">${items}</div></div>`;
      }).join('');
    }

    function renderSchedule() {
      return turns.map((turn, index) => `
        <div class="schedule-item ${index === state.turn ? 'current' : ''}">
          <strong>${index + 1}. ${turn.name}</strong><br>${turn.period}${turn.prep ? ` / 準備${turn.prep}回` : ''}
        </div>
      `).join('');
    }

    function renderFlow(turn, phaseName) {
      return turn.phases.map((phase) => `
        <div class="flow-step ${phase === phaseName ? 'active' : ''}">
          <strong>${phase}</strong>
          <span>${phase === '講習期準備' ? `${turn.prep}回実行` : '実行中の画面'}</span>
        </div>
      `).join('');
    }

    function openOverlay(selector, trigger) {
      const overlay = document.querySelector(selector);
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      if (trigger) trigger.setAttribute('aria-expanded', 'true');
    }

    function closeOverlay(selector) {
      const overlay = document.querySelector(selector);
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      if (selector === '#phaseOverlay') {
        document.getElementById('summaryToggle').setAttribute('aria-expanded', 'false');
      }
      if (selector === '#menuOverlay') {
        document.getElementById('menuToggle').setAttribute('aria-expanded', 'false');
      }
    }

    function render() {
      const turn = turns[state.turn];
      const phaseName = turn.phases[state.phase];
      const info = phaseInfo(turn, phaseName);

      document.getElementById('periodPill').textContent = turn.period;
      document.getElementById('turnPill').textContent = turn.name;
      document.getElementById('phasePill').textContent = phaseName;
      document.getElementById('phaseCount').textContent = `${state.turn + 1} / ${turns.length}`;
      document.getElementById('phaseName').textContent = info.title;
      document.getElementById('phaseDescription').textContent = info.desc;
      document.getElementById('mainPanelTitle').textContent = `${turn.name} / ${phaseName}`;
      document.getElementById('mockContent').innerHTML = renderMock(turn, phaseName);
      document.getElementById('flowLine').innerHTML = renderFlow(turn, phaseName);
      document.getElementById('deckColumns').innerHTML = renderDecks(state.turn, phaseName);
      document.getElementById('scheduleList').innerHTML = renderSchedule();
      document.getElementById('checkpoints').innerHTML = info.checkpoints.map((item) => `<div class="check-item">${item}</div>`).join('');
      document.getElementById('log').innerHTML = [
        `${turn.name}: ${phaseName}を表示`,
        turn.period === '通常期' ? `${turn.pool}研修プールを参照` : 'スタッフ別講習デッキを参照',
        phaseName === '研修' ? '四択ボタンを固定表示したまま獲得演出を再生' : '次のフェーズへ進行可能'
      ].map((line) => `<div class="log-line">${line}</div>`).join('');

      document.getElementById('mExp').textContent = state.turn < 4 ? state.turn * 3 : 12;
      document.getElementById('mEnroll').textContent = state.turn < 4 ? state.turn : 8 + state.turn;
      document.getElementById('mSat').textContent = 3 + Math.min(state.turn, 8);
      document.getElementById('mAcc').textContent = 3 + Math.min(state.turn * 2, 18);
      document.getElementById('tPassion').textContent = turn.period === '講習期' ? '4' : '3';
      document.getElementById('tIdea').textContent = turn.period === '講習期' ? '1' : '0';
      document.getElementById('tOrganize').textContent = turn.period === '講習期' ? '1' : '0';

      document.querySelectorAll('.turn-button').forEach((button, index) => {
        button.setAttribute('aria-current', index === state.turn ? 'true' : 'false');
      });
      document.querySelectorAll('.phase-tab').forEach((button, index) => {
        button.setAttribute('aria-selected', index === state.phase ? 'true' : 'false');
      });
    }

    function renderNav() {
      document.getElementById('turnList').innerHTML = turns.map((turn, index) => `
        <button type="button" class="turn-button" data-turn="${index}" aria-current="${index === 0 ? 'true' : 'false'}">
          <span class="turn-no">${index + 1}</span>
          <span><span class="turn-title">${turn.name}</span><span class="turn-sub">${turn.period}${turn.prep ? ` / 準備${turn.prep}回` : ''}</span></span>
        </button>
      `).join('');
      document.querySelectorAll('.turn-button').forEach((button) => {
        button.addEventListener('click', () => {
          state.turn = Number(button.dataset.turn);
          state.phase = 0;
          renderPhaseTabs();
          render();
        });
      });
      renderPhaseTabs();
    }

    function renderPhaseTabs() {
      const turn = turns[state.turn];
      document.getElementById('phaseTabs').innerHTML = turn.phases.map((phase, index) => `
        <button type="button" class="phase-tab" data-phase="${index}" aria-selected="${index === state.phase ? 'true' : 'false'}">${phase}</button>
      `).join('');
      document.querySelectorAll('.phase-tab').forEach((button) => {
        button.addEventListener('click', () => {
          state.phase = Number(button.dataset.phase);
          render();
        });
      });
    }

    function move(delta) {
      const turn = turns[state.turn];
      const nextPhase = state.phase + delta;
      if (nextPhase >= 0 && nextPhase < turn.phases.length) {
        state.phase = nextPhase;
      } else if (delta > 0 && state.turn < turns.length - 1) {
        state.turn += 1;
        state.phase = 0;
        renderPhaseTabs();
      } else if (delta < 0 && state.turn > 0) {
        state.turn -= 1;
        state.phase = turns[state.turn].phases.length - 1;
        renderPhaseTabs();
      }
      render();
    }

    document.getElementById('nextButton').addEventListener('click', () => move(1));
    document.getElementById('prevButton').addEventListener('click', () => move(-1));
    document.getElementById('summaryToggle').addEventListener('click', () => openOverlay('#phaseOverlay', document.getElementById('summaryToggle')));
    document.getElementById('menuToggle').addEventListener('click', () => openOverlay('#menuOverlay', document.getElementById('menuToggle')));
    document.querySelectorAll('[data-close]').forEach((button) => {
      button.addEventListener('click', () => closeOverlay(button.dataset.close));
    });
    document.querySelectorAll('.overlay').forEach((overlay) => {
      overlay.addEventListener('click', (event) => {
        if (event.target === overlay) closeOverlay(`#${overlay.id}`);
      });
    });

    renderNav();
    render();
  </script>
</body>
</html>
